    <style>
      #kf-loader {
        position: fixed; inset: 0; z-index: 99999;
        background:
          radial-gradient(circle at 12% 8%, rgba(80,108,131,0.18), transparent 28%),
          radial-gradient(circle at 88% 18%, rgba(232,236,240,0.07), transparent 24%),
          linear-gradient(180deg, #101319 0%, #0d0d0d 100%);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        transition: opacity .55s ease, visibility .55s ease;
      }
      #kf-loader.kf-hide { opacity: 0; visibility: hidden; pointer-events: none; }

      #kf-loader .kf-stack { display: flex; flex-direction: column; align-items: center; gap: 28px; }

      #kf-loader svg { display: block; }
      #kf-loader svg path {
        fill: #ffffff;
        stroke: #ffffff;
        stroke-width: 1.5;
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        fill-opacity: 0;
        animation: kf-draw 2.2s cubic-bezier(.65,.05,.36,1) .6s forwards,
                   kf-fill .9s ease 2.1s forwards;
      }
      #kf-loader svg path:nth-child(2) { animation-delay: .75s, 2.25s; }

      @keyframes kf-draw { to { stroke-dashoffset: 0; } }
      @keyframes kf-fill { to { fill-opacity: 1; } }

      #kf-loader .kf-word {
        color: #ffffff;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: .42em;
        padding-left: .42em;
        height: 28px;
        display: flex; align-items: center;
        overflow: hidden;
      }
      #kf-loader .kf-word .kf-letter {
        display: inline-block;
        opacity: 0;
        transform: translateY(6px);
        animation: kf-letter .5s ease forwards;
      }
      @keyframes kf-letter { to { opacity: 1; transform: translateY(0); } }

      #kf-loader .kf-dots {
        position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px;
      }
      #kf-loader .kf-dots span {
        width: 6px; height: 6px; border-radius: 50%; background: #ffffff;
        opacity: .2;
        animation: kf-dot 1.2s ease-in-out infinite;
      }
      #kf-loader .kf-dots span:nth-child(2) { animation-delay: .15s; }
      #kf-loader .kf-dots span:nth-child(3) { animation-delay: .3s; }
      @keyframes kf-dot {
        0%, 100% { opacity: .2; }
        50%      { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        #kf-loader svg path { stroke-dashoffset: 0; fill-opacity: 1; animation: none; }
        #kf-loader .kf-word .kf-letter { opacity: 1; transform: none; animation: none; }
        #kf-loader .kf-dots span { animation: none; opacity: .5; }
      }
    </style>

    <script>
      (function () {
        var loader = document.getElementById('kf-loader');
        if (!loader) return;
        var MIN_MS = 4800;
        var MAX_MS = 8000;
        var started = performance.now();

        function hide() {
          var elapsed = performance.now() - started;
          var wait = Math.max(0, MIN_MS - elapsed);
          setTimeout(function () {
            document.body.classList.add('kf-app-visible');
            loader.classList.add('kf-hide');
          }, wait);
        }
        if (document.readyState === 'complete') hide();
        else window.addEventListener('load', hide);
        setTimeout(hide, MAX_MS);
      })();
    </script>
