<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KrydsFelt Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0a1420; color: #f5f5f3; }
  body { font-family: 'VT323', 'Courier New', monospace; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  button { font-family: inherit; }

  @keyframes kfMarquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-33.333%); }
  }
  @keyframes kfFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-14px) rotate(4deg); }
  }
  @keyframes kfPulse {
    0%, 100% { transform: scale(1);   filter: brightness(1); }
    50%      { transform: scale(1.05); filter: brightness(1.2); }
  }
  @keyframes kfBlink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* responsive grids */
  @media (max-width: 1024px) {
    .arcade-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 640px) {
    .arcade-grid-4 { grid-template-columns: 1fr !important; }
    .arcade-stats { grid-template-columns: repeat(2, 1fr) !important; }
    .arcade-nav-links { display: none !important; }
    .arcade-board-row > div:nth-child(4),
    .arcade-board-head > div:nth-child(4) { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="arcade-page.jsx"></script>
</body>
</html>
